services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/production/backend.Dockerfile
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    volumes:
      - ../../experiments:/app/experiments

  worker:
    build:
      context: ../..
      dockerfile: deploy/production/backend.Dockerfile
    command: python -m backend.app.worker_daemon
    env_file:
      - ../../.env
    volumes:
      - ../../experiments:/app/experiments
    depends_on:
      - backend

  frontend:
    build:
      context: ../..
      dockerfile: deploy/production/frontend.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
