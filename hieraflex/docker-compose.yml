services:
  backend:
    build:
      context: .
      dockerfile: deploy/huggingface/Dockerfile
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    working_dir: /workspace/hieraflex
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    image: node:20-alpine
    working_dir: /workspace/hieraflex/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/workspace/hieraflex
    ports:
      - "5173:5173"
    depends_on:
      - backend
